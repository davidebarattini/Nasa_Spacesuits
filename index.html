<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spacesuit Evolution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="viewport" id="viewport" aria-label="Presentazione orizzontale">
        <main class="deck" id="deck"></main>
      </div>

      <nav class="timeline" id="timeline" aria-label="Timeline"></nav>
    </div>

    <!-- 3D viewer (solo quando usato nelle slide tuta) -->
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
